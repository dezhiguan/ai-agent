server:
  port: 8080

# DeepSeek 大模型配置（兼容 OpenAI 格式，由 Spring AI 的 OpenAI 客户端转发）
# 密钥请使用环境变量 DEEPSEEK_API_KEY，勿将真实 key 写入仓库或提交 Git
deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-07dc2ffe548d40888bf6f39fdbf21248}
  base-url: https://api.deepseek.com
  model-name: deepseek-chat

spring:
  application:
    name: three-kingdoms-quiz
  ai:
    openai:
      api-key: ${deepseek.api-key}
      base-url: ${deepseek.base-url}
      chat:
        options:
          model: ${deepseek.model-name}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/three_kingdoms_quiz?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:11111111}

# 诸葛亮智能助手（错题 AI 解析）
# 启动时是否插入默认答题用户 local_player（需数据库已有 sys_user 表）
app:
  seed:
    default-quiz-user: true
  ai:
    zhugeliang:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: INFO
