# 单元测试使用内存库，避免依赖本机 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:quiz_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

# 测试库无表结构时不执行启动种子用户（见 DefaultQuizUserSeedRunner）
app:
  seed:
    default-quiz-user: false
